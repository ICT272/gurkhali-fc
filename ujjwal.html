<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ujjwal KC – Gurkhali FC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;600;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --red: #c0001e;
    --gold: #d4a017;
    --navy: #0d1b3e;
    --dark: #080e1f;
    --white: #f5f0e8;
    --gray: #9aa0b0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--dark); color:var(--white); font-family:'Raleway',sans-serif; }

  nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 40px; background:rgba(8,14,31,0.98);
    border-bottom:1px solid rgba(212,160,23,0.3);
  }
  .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
  .nav-logo img { width:48px; height:48px; object-fit:contain; border-radius:50%; }
  .nav-brand { font-family:'Cinzel',serif; font-size:1rem; color:var(--gold); }
  .back-btn {
    padding:10px 24px; background:transparent; border:2px solid var(--gold);
    color:var(--gold); font-family:'Raleway',sans-serif; font-weight:700;
    font-size:0.8rem; letter-spacing:2px; text-transform:uppercase;
    text-decoration:none; border-radius:2px; transition:all 0.3s;
  }
  .back-btn:hover { background:var(--gold); color:var(--dark); }

  .hero {
    display:grid; grid-template-columns:1fr 1fr;
    min-height:90vh; align-items:center;
  }
  .hero-img {
    height:90vh; overflow:hidden;
    position:relative;
  }
  .hero-img img {
    width:100%; height:100%; object-fit:cover; object-position:top;
  }
  .hero-img::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(to right, transparent 60%, var(--dark) 100%);
  }
  .hero-info {
    padding:60px;
    background:var(--dark);
  }
  .player-number {
    font-family:'Bebas Neue',sans-serif; font-size:8rem;
    color:rgba(212,160,23,0.15); line-height:1; margin-bottom:-20px;
  }
  .player-name {
    font-family:'Cinzel',serif; font-size:3rem;
    font-weight:900; color:var(--white); line-height:1.1; margin-bottom:12px;
  }
  .player-pos {
    display:inline-block; padding:6px 20px;
    background:var(--red); color:#fff;
    font-size:0.75rem; letter-spacing:3px; text-transform:uppercase;
    font-weight:700; margin-bottom:32px;
  }
  .gold-line { width:60px; height:3px; background:linear-gradient(to right, var(--red), var(--gold)); margin-bottom:32px; }
  .bio {
    color:var(--gray); line-height:1.9; font-size:1rem;
    font-weight:300; margin-bottom:40px;
  }
  .stats-grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:40px;
  }
  .stat {
    background:rgba(255,255,255,0.04); border:1px solid rgba(212,160,23,0.2);
    padding:20px; text-align:center; border-radius:4px;
  }
  .stat-num { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:var(--gold); }
  .stat-label { font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--gray); }

  @media(max-width:768px) {
    .hero { grid-template-columns:1fr; }
    .hero-img { height:50vh; }
    .hero-info { padding:30px 20px; }
    .player-name { font-size:2rem; }
    nav { padding:12px 20px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="GurkhaliFC.html">
    <img src="images/logo.jpeg" alt="Gurkhali FC"/>
    <div class="nav-brand">Gurkhali FC</div>
  </a>
  <a class="back-btn" href="GurkhaliFC.html">← Back to Squad</a>
</nav>

<div class="hero">
  <div class="hero-img">
    <img src="images/ujjwal.jpeg" alt="Ujjwal KC"/>
  </div>
  <div class="hero-info">
    <div class="player-number">10</div>
    <h1 class="player-name">Ujjwal<br>KC</h1>
    <div class="player-pos">Defender</div>
    <div class="gold-line"></div>
    <p class="bio">Ujjwal is a versatile defender with excellent ball-handling skills and a strong work ethic. He contributes significantly to both defensive and offensive plays for Gurkhali FC.</p>
    <div class="stats-grid">
  <div class="stat">
    <div class="stat-num">10</div>
    <div class="stat-label">Jersey No.</div>
  </div>
  <div class="stat">
    <div class="stat-num">8</div>
    <div class="stat-label">Goals</div>
  </div>
  <div class="stat">
    <div class="stat-num">5</div>
    <div class="stat-label">Assists</div>
  </div>
  <div class="stat">
    <div class="stat-num">14</div>
    <div class="stat-label">Matches</div>
  </div>
</div>
  </div>
</div>

</body>
</html>
