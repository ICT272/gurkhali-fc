<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photos – Gurkhali FC</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;600;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #c0001e;
      --gold: #d4a017;
      --dark: #080e1f;
      --white: #f5f0e8;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--dark); color:var(--white); font-family:'Raleway',sans-serif; }

    nav {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 40px; background:rgba(8,14,31,0.98);
      border-bottom:1px solid rgba(212,160,23,0.3);
    }
    .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .nav-logo img { width:48px; height:48px; object-fit:contain; border-radius:50%; }
    .nav-brand { font-family:'Cinzel',serif; font-size:1rem; color:var(--gold); }
    .back-btn {
      padding:10px 24px; background:transparent;
      border:2px solid var(--gold); color:var(--gold);
      font-family:'Raleway',sans-serif; font-weight:700;
      text-decoration:none; border-radius:4px;
      letter-spacing:2px; font-size:0.8rem;
    }
    .back-btn:hover { background:var(--gold); color:var(--dark); }

    .gallery-section { padding:80px 40px; }
    .gallery-header { text-align:center; margin-bottom:40px; }
    .section-label {
      color:var(--gold); letter-spacing:3px;
      text-transform:uppercase; font-size:0.85rem;
    }
    .section-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:3rem; color:var(--white);
    }
    .section-title span { color:var(--gold); }
    .gold-line {
      width:60px; height:3px;
      background:var(--red); margin:10px auto;
    }
    .gallery-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
      gap:16px; max-width:1200px; margin:0 auto;
    }
    .gallery-item {
      position:relative; overflow:hidden;
      border-radius:10px; border:1px solid var(--gold);
      cursor:pointer; aspect-ratio:4/3;
    }
    .gallery-item img {
      width:100%; height:100%;
      object-fit:cover; transition:transform 0.4s;
    }
    .gallery-item:hover img { transform:scale(1.08); }
    .gallery-overlay {
      position:absolute; inset:0;
      background:rgba(0,0,0,0.4);
      display:flex; align-items:center;
      justify-content:center; font-size:2rem;
      opacity:0; transition:opacity 0.3s;
    }
    .gallery-item:hover .gallery-overlay { opacity:1; }

    .photo-viewer {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.95); z-index:9999;
      justify-content:center; align-items:center; cursor:pointer;
    }
    .photo-viewer.active { display:flex; }
    .photo-viewer img {
      max-width:90%; max-height:90vh;
      border-radius:8px; border:2px solid var(--gold);
    }
    .viewer-close {
      position:absolute; top:20px; right:30px;
      color:var(--gold); font-size:2rem; cursor:pointer;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="GurkhaliFC.html">
    <img src="images/logo.jpeg" alt="Logo">
    <div class="nav-brand">Gurkhali FC</div>
  </a>
  <a class="back-btn" href="GurkhaliFC.html">← Back to Squad</a>
</nav>

<section class="gallery-section">
  <div class="gallery-header">
    <p class="section-label">Moments</p>
    <h2 class="section-title">Match <span>Gallery</span></h2>
    <div class="gold-line"></div>
  </div>
  <div class="gallery-grid">

    <div class="gallery-item" onclick="openPhoto('images/match1.JPEG')">
      <img src="images/match1.JPEG" alt="Match 1"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/match2.JPG')">
      <img src="images/match2.JPG" alt="Match 2"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/match3.JPG')">
      <img src="images/match3.JPG" alt="Match 3"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/match4.JPG')">
      <img src="images/match4.JPG" alt="Match 4"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/match5.JPG')">
      <img src="images/match5.JPG" alt="Match 5"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/match6.JPG')">
      <img src="images/match6.JPG" alt="Match 6"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/match7.JPEG')">
      <img src="images/match7.JPEG" alt="Match 7"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/old team.JPEG')">
      <img src="images/old team.JPEG" alt="Old Team"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/team.JPEG')">
      <img src="images/team.JPEG" alt="Team Photo"/>
      <div class="gallery-overlay">🔍</div>
    </div>
    <div class="gallery-item" onclick="openPhoto('images/teamb.JPEG')">
      <img src="images/teamb.JPEG" alt="Team B"/>
      <div class="gallery-overlay">🔍</div>
    </div>

  </div>
</section>

<div class="photo-viewer" id="photoViewer" onclick="closePhoto()">
  <span class="viewer-close">✕</span>
  <img id="viewerImg" src="" alt="">
</div>

<script>
  function openPhoto(src) {
    document.getElementById('viewerImg').src = src;
    document.getElementById('photoViewer').classList.add('active');
  }
  function closePhoto() {
    document.getElementById('photoViewer').classList.remove('active');
  }
</script>

</body>
</html>
